<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
    <h1 id="user_signup">Sign Up</h1>
    <div class = "signup_container">
        <form >
            <fieldset class = "signup_name">
                <label for="first_name" id = "label_firstname">First name</label>
                <input type = "text" id = "first_name" placeholder="First name ...">

                <label for = "last_name" id = "label_lastname">Last name</label>
                <input type ="text" id = "last_name" placeholder=" Last name .. ">
            </fieldset>
            <fieldset class="signup_email">
                <label for = "user_email "id="label_email">Email</label>
                <input type = "email" id = "user_email" placeholder="Email">

                <label for = "user_singup_password" id ="label_password"> Password</label>
                <input type = "password" id = "user_signup_password" placeholder="xxxxxxx">

            </fieldset>
            <fieldset class = "signup_age">
                <label for ="DOB">Date Of Birth:</label>
                <input type = "date" id = "user_dob" placeholder = " 2026">

                <label for = "user_age" id="label_age">Age</label>
                <input type = "number" id = "user_age" placeholder = "....">

            </fieldset>
           
            <fieldset id = "gender">
            <label>Male</label>
            <input type = "radio" id = "user_gender1" >
            <label>Female</label>
            <input type = "radio" id = "user_gender2" >
            <label>Other</label>
            <input type = "radio" id = "user_gender3" >
            </fieldset>
            <button id = "submit_btn">Submit</button>
           
        </form>

    </div>
    
</body>
<script src = "server.js"></script>
</html>
